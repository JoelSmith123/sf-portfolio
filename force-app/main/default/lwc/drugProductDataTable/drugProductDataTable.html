<template>
    <lightning-card title="Drug Product Portfolio" icon-name="custom:custom66">
        <!-- New Drug Product button in card header -->
        <div slot="actions">
            <lightning-button
                label="New Drug Product"
                icon-name="utility:add"
                variant="brand"
                onclick={handleNewRecord}>
            </lightning-button>
        </div>

        <div class="slds-var-m-around_medium">
            <lightning-input
                type="search"
                label="Search Drug Products"
                placeholder="Search by name, NDC, manufacturer, or therapeutic area..."
                onchange={handleSearchChange}
                value={searchTerm}
                variant="label-hidden">
            </lightning-input>
        </div>

        <div class="slds-var-m-horizontal_medium slds-var-m-bottom_small">
            <p class="record-count">
                Showing {recordCount} record(s)
            </p>
        </div>

        <template if:true={hasData}>
            <lightning-datatable
                key-field="Id"
                data={sortedData}
                columns={columns}
                sorted-by={sortedBy}
                sorted-direction={sortedDirection}
                onsort={handleSort}
                onsave={handleSave}
                onrowaction={handleRowAction}
                draft-values={draftValues}
                show-row-number-column
                errors={errors}>
            </lightning-datatable>
        </template>

        <template if:true={hasNoData}>
            <div class="slds-align_absolute-center slds-var-p-around_large">
                <p class="slds-text-body_regular slds-text-color_weak">
                    No drug products found. Try adjusting your search.
                </p>
            </div>
        </template>

        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading drug products" size="medium">
            </lightning-spinner>
        </template>

        <template if:true={hasError}>
            <div class="slds-var-m-around_medium">
                <p class="slds-text-color_error">{errorMessage}</p>
            </div>
        </template>
    </lightning-card>
</template>
